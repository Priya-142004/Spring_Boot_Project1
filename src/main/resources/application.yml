server:
  port: 2222

logging:
  level:
    root: OFF
    com.priya: TRACE
  file:
    name: logs/app.log

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/priyadb2
    username: priya
    password: priya

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect